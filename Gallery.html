<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        body {
            background-color: #333333;
            color: #eaeaea;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

                #gallery {
            position: relative;
            width: 700px;
            margin: 20px auto;
        }

        
        #gallery figure {
            position: absolute;
            left: 280px;
            text-align: center;
            opacity: .25;
        }

                #gallery ul {
            width: 300px;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #gallery li {
            display: inline;
            float: left;
            padding: 10px;
        }

        #gallery img {
            border: none;
        }

        #gallery a {
            text-decoration: none;
            color: #eaeaea;
            font-style: italic;
        }

                #gallery span {
            position: absolute;
            left: -1000px;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

               #gallery a:hover span {
            position: absolute;
            top: 16px;
            left: 320px;
            text-align: center;
            opacity: 1;
        }
    </style>
</head>

<body>

<h1>Image Gallery</h1>

<div id="gallery">
